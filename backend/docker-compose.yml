services:
  postgres:
    image: postgres:16-alpine
    container_name: portal-rh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: portal_rh
      POSTGRES_PASSWORD: portal_rh_secret
      POSTGRES_DB: portal_rh
    ports:
      - "5432:5432"
    volumes:
      - portal_rh_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal_rh -d portal_rh"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal-rh-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://portal_rh:portal_rh_secret@postgres:5432/portal_rh?schema=public
      NODE_ENV: production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy

  # Optional: MinIO for S3-compatible document storage (local dev)
  minio:
    image: minio/minio:latest
    container_name: portal-rh-minio
    profiles: ["storage"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - portal_rh_minio:/data

volumes:
  portal_rh_pgdata:
  portal_rh_minio:
